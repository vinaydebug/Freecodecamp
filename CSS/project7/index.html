<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <form action="">
      <h1 class="heading-text">Job Application Form</h1>
      <label for="name">Full Name: </label><input type="text" name="name" id="name" placeholder="Enter your full name" required>
      <label for="email">Full Email: </label><input type="email" name="email" id="email" placeholder="Enter your full email" required>
      <label for="position">Position: </label>
      <select name="position" id="position" required>
        <option value="" checked>Select the position</option>
        <option value="developer" checked>Developer</option>
        <option value="designer" checked>Designer</option>
        <option value="manager" checked>Manager</option>
        <option value="tlfe" checked>Team Lead (FE)</option>
        <option value="tlbe" checked>Team Lead (BE)</option>
      </select>
      <fieldset class="radio-group">
  <legend>Position type</legend>

  <div class="radio-option">
    <input type="radio" name="availability" id="full-time" class="radio-btn">
    <label for="full-time" class="full-time">Full Time</label>
  </div>

  <div class="radio-option">
    <input type="radio" name="availability" id="part-time" class="radio-btn">
    <label for="part-time" class="part-time">Part Time</label>
  </div>
</fieldset>
      <label for="message">Why do you want this job?</label><textarea name="message" id="message" rows="6" placeholder="Let us know you better..." required></textarea>
      <button type="submit" value="Submit Application">Submit Application</button>
    </form>
  </div>
</body>
</html>
