<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="form-container">
        <form action="">
            <h2>Contact us</h2>
            <label for="user-name">Name: </label><input type="text" name="user-name" id="user-name" required>
            <label for="user-email">Email: </label><input type="email" name="user-email" id="user-email" required>
            <label for="message">Message: </label>
            <textarea name="message" id="message" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
